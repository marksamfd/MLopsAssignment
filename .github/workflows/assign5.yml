name: ML Training & Deployment Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  validate:
    name: Train & Validate Model
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          uv sync --locked --all-extras --dev

      - name: Install DVC
        run: pip install dvc[s3]
      # 4. Configure DVC remote credentials for DagsHub
      - name: Configure DagsHub DVC remote
        run: |
          dvc remote add -f origin s3://dvc
          dvc remote modify origin endpointurl https://dagshub.com/marksamfd/MLopsAssignment.s3
          dvc remote modify origin --local access_key_id ${{ secrets.DAGSHUB_ACCESS_KEY_ID }}
          dvc remote modify origin --local secret_access_key ${{ secrets.DAGSHUB_SECRET_ACCESS_KEY }}

      - name: Pull data with DVC
        run: dvc pull

      - name: Train model & log to MLflow
        run: |
          uv run main.py 1
          # train.py must write the Run ID to model_info.txt
          echo "model_info.txt contents:"
          cat model_info.txt

      # 7. Upload model_info.txt as a pipeline artifact
      - name: Upload model_info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt
          retention-days: 7

  deploy:
    name: Check Threshold & Deploy
    runs-on: ubuntu-latest
    needs: validate   # depends on the validate job

    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
      MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
      

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          uv sync --locked --all-extras --dev

      - name: Download model_info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Display Run ID
        run: |
          echo "Run ID received:"
          cat model_info.txt

      - name: Check accuracy threshold
        run: uv run check_threshold.py

      - name: Mock Docker Build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"
          docker build \
            --build-arg RUN_ID=$(cat model_info.txt) \
            -t ml-model:$(cat model_info.txt) \
            .
          echo "Docker image built successfully!"