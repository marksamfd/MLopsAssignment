name: ML Training & Deployment Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  validate:
    name: Train & Validate Model
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      

    steps:
      # 1. Checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
      # 3. Install dependencies
      - name: Install dependencies
        run: |
          uv sync

      # 4. Configure DVC remote credentials for DagsHub
      - name: Configure DagsHub DVC remote
        run: |
          dvc remote modify origin --local auth basic
          dvc remote modify origin --local access_key_id ${{ secrets.DAGSHUB_ACCESS_KEY_ID }}
          dvc remote modify origin --local secret_access_key ${{ secrets.DAGSHUB_secret_ACCESS_KEY }}

      # 5. Pull training data via DVC
      - name: Pull data with DVC
        run: dvc pull

      # 6. Train the model and export the MLflow Run ID
      - name: Train model & log to MLflow
        run: |
          python train.py --epochs 1
          # train.py must write the Run ID to model_info.txt
          echo "model_info.txt contents:"
          cat model_info.txt

      # 7. Upload model_info.txt as a pipeline artifact
      - name: Upload model_info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt
          retention-days: 7

  deploy:
    name: Check Threshold & Deploy
    runs-on: ubuntu-latest
    needs: validate   # depends on the validate job

    env:
      MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      

    steps:
      # 1. Checkout (needed for check_threshold.py & Dockerfile)
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 3. Install dependencies (mlflow client needed for threshold check)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow

      # 4. Download model_info.txt from the validate job
      - name: Download model_info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      # 5. Show what we received
      - name: Display Run ID
        run: |
          echo "Run ID received:"
          cat model_info.txt

      # 6. Run accuracy threshold check (fails pipeline if accuracy < 0.85)
      - name: Check accuracy threshold
        run: python check_threshold.py

      # 7. Mock Docker build (only runs if threshold check passed)
      - name: Mock Docker Build
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"
          docker build \
            --build-arg RUN_ID=$(cat model_info.txt) \
            -t ml-model:$(cat model_info.txt) \
            .
          echo "Docker image built successfully!"